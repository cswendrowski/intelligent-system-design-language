name: Deploy docs to GitHub Pages

# Proof-of-concept: builds a VitePress site from the wiki content and deploys to Pages.
# The wiki stays the single source of truth — sync-wiki.mjs clones it fresh on every run.
#
# One-time manual step before this works: Settings → Pages → Source = "GitHub Actions".

on:
  push:
    branches: [main]
    paths:
      - 'website/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install deps
        working-directory: website
        run: npm install
      - name: Build (syncs the wiki first)
        working-directory: website
        run: npm run build
        env:
          WIKI_REPO: https://github.com/${{ github.repository }}.wiki.git
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: website/.vitepress/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
