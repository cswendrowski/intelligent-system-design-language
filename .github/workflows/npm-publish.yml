name: Publish VS Code Extension

on:
  release:
    types: [published]

jobs:
  # Package & publish a platform-specific VSIX per target. The generator runs Vite, whose
  # rollup/esbuild dependencies load a native binary that must match the user's OS/arch.
  # A single Windows-built VSIX only carried the win32 binary, so Linux/macOS users hit
  # "Cannot find module @rollup/rollup-linux-x64-gnu" when generating. Building each target
  # on its own native runner means `npm ci` installs exactly the right native binaries, and
  # `vsce --target` produces a platform-specific VSIX that the Marketplace serves per user.
  package:
    name: Package & publish (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: win32-x64
          - os: ubuntu-latest
            target: linux-x64
          # Requires GitHub-hosted Arm Linux runners (GA for public repositories). Remove
          # this entry if your repo can't schedule arm64 runners.
          - os: ubuntu-24.04-arm
            target: linux-arm64
          - os: macos-latest    # Apple Silicon runner -> darwin-arm64 binaries
            target: darwin-arm64
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    # Surfaced as an env var so the Open VSX step can no-op when the secret is unset
    # (e.g. on forks) -- secrets can't be referenced directly in a step `if:`.
    env:
      OVSX_PAT: ${{ secrets.OVSX_PAT }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: npm ci
      working-directory: ./isdl

    - name: Generate Langium
      run: npm run langium:generate
      working-directory: ./isdl

    # Bump the version BEFORE building: esbuild copies package.json into
    # out/ during the build, and the generator reads that copy to stamp the
    # isdl-version flag into generated systems. Building first would bake in
    # the stale committed version instead of the release version.
    - name: Set version from release tag
      working-directory: ./isdl
      run: npm version "${{ github.event.release.tag_name }}" --no-git-tag-version --allow-same-version

    - name: Build
      run: npm run build
      working-directory: ./isdl

    - name: Package extension (${{ matrix.target }})
      working-directory: ./isdl
      run: npx --yes @vscode/vsce package --target ${{ matrix.target }} -o "isdl-${{ matrix.target }}.vsix"

    - name: Publish to VS Code Marketplace
      working-directory: ./isdl
      env:
        VSCE_PAT: ${{ secrets.VSCE_PAT }}
      run: npx --yes @vscode/vsce publish --packagePath "isdl-${{ matrix.target }}.vsix"

    # Open VSX is the registry VSCodium and other OSS editors install from. ovsx reads the
    # OVSX_PAT env var and infers the platform target from the packaged VSIX. Requires the
    # publisher namespace to exist on open-vsx.org with this token's account as a member.
    - name: Publish to Open VSX
      if: ${{ env.OVSX_PAT != '' }}
      working-directory: ./isdl
      run: npx --yes ovsx publish "isdl-${{ matrix.target }}.vsix"

    - name: Upload VSIX to release
      working-directory: ./isdl
      env:
        GH_TOKEN: ${{ github.token }}
      run: gh release upload "${{ github.event.release.tag_name }}" "isdl-${{ matrix.target }}.vsix" --clobber

  # The CLI is platform-independent, so it's published once from a single job. npm resolves
  # the correct native binaries per-platform at install time, so no matrix is needed here.
  publish-cli:
    name: Publish CLI to npm
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write 

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        registry-url: 'https://registry.npmjs.org'

    - name: Install dependencies
      run: npm ci
      working-directory: ./isdl

    - name: Generate Langium
      run: npm run langium:generate
      working-directory: ./isdl

    - name: Set version from release tag
      working-directory: ./isdl
      run: npm version "${{ github.event.release.tag_name }}" --no-git-tag-version --allow-same-version

    - name: Build
      run: npm run build
      working-directory: ./isdl

    # The package.json name stays "isdl" for the VS Code Marketplace identity
    # (IronMooseDevelopment.isdl). npm rejects "isdl" as too similar to existing
    # packages, so rename to the npm package name for the publish only. The
    # Marketplace VSIXs are built in the separate `package` job, so this rename
    # doesn't affect them. The bin commands (isdl / isdl-lsp) are independent of
    # the package name and stay the same.
    - name: Publish CLI to npm
      working-directory: ./isdl
      run: |
        npm pkg set name=intelligent-system-design-language
        npm publish --provenance --access public
