name: Publish VS Code Extension

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install dependencies
      run: npm ci
      working-directory: ./isdl

    - name: Generate Langium
      run: npm run langium:generate
      working-directory: ./isdl

    - name: Build
      run: npm run build
      working-directory: ./isdl

    - name: Set version from release tag
      working-directory: ./isdl
      run: npm version "${{ github.event.release.tag_name }}" --no-git-tag-version --allow-same-version

    - name: Install vsce
      run: npm install -g @vscode/vsce

    - name: Package extension
      working-directory: ./isdl
      run: vsce package

    - name: Publish to VS Code Marketplace
      working-directory: ./isdl
      env:
        VSCE_PAT: ${{ secrets.VSCE_PAT }}
      run: vsce publish -p "$VSCE_PAT"

    - name: Upload VSIX to release
      working-directory: ./isdl
      env:
        GH_TOKEN: ${{ github.token }}
      run: gh release upload "${{ github.event.release.tag_name }}" *.vsix
