name: Publish VS Code Extension

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        registry-url: 'https://registry.npmjs.org'

    - name: Install dependencies
      run: npm ci
      working-directory: ./isdl

    - name: Generate Langium
      run: npm run langium:generate
      working-directory: ./isdl

    # Bump the version BEFORE building: esbuild copies package.json into
    # out/ during the build, and the generator reads that copy to stamp the
    # isdl-version flag into generated systems. Building first would bake in
    # the stale committed version instead of the release version.
    - name: Set version from release tag
      working-directory: ./isdl
      run: npm version "${{ github.event.release.tag_name }}" --no-git-tag-version --allow-same-version

    - name: Build
      run: npm run build
      working-directory: ./isdl

    - name: Install vsce
      run: npm install -g @vscode/vsce

    - name: Package extension
      working-directory: ./isdl
      run: vsce package

    - name: Publish to VS Code Marketplace
      working-directory: ./isdl
      env:
        VSCE_PAT: ${{ secrets.VSCE_PAT }}
      run: vsce publish -p "${{ secrets.VSCE_PAT }}"

    - name: Upload VSIX to release
      working-directory: ./isdl
      env:
        GH_TOKEN: ${{ github.token }}
      run: gh release upload "${{ github.event.release.tag_name }}" *.vsix

    - name: Publish CLI to npm
      working-directory: ./isdl
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      run: npm publish --access public
